<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="shdw - Personal Bio Card">
  <title>shdw | Bio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;500;600;700;800;900&family=Russo+One&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Entry Gate Screen -->
  <div class="entry-screen" id="entry-screen">
    <div class="entry-content">
      <div class="entry-text">Нажми чтобы продолжить</div>
      <div class="entry-text-en">Click to continue</div>
      <div class="entry-pulse"></div>
    </div>
  </div>

  <!-- Background Video and Liquid Glass Blobs -->
  <div class="video-background">
    <video id="bg-video" playsinline muted>
      <source src="edit1.mp4" type="video/mp4">
    </video>
    
    <!-- Dynamic morphing blobs for liquid glass background effect (Google Colors) -->
    <div class="liquid-bg-container">
      <div class="liquid-blob blob-blue"></div>
      <div class="liquid-blob blob-red"></div>
      <div class="liquid-blob blob-yellow"></div>
      <div class="liquid-blob blob-green"></div>
    </div>
    
    <div class="video-fade-overlay" id="video-fade"></div>
    <div class="video-overlay"></div>
  </div>



  <!-- Main Container -->
  <main class="main-container" id="main-content">
    <div class="bio-card">
      <div class="card-glow"><div class="card-glow-inner"></div></div>
      <div class="card-border"></div>
      <div class="card-bg"></div>
      <div class="card-content">
        <div class="avatar-container">
          <img alt="shdw avatar" src="avatars/photo_2025-12-26_21-41-20.jpg" class="avatar" id="avatar">
        </div>
        <h1 class="nickname">shdw</h1>
        <p class="quote">« Дельта это форс »</p>
        
        <!-- Snow canvas dedicated to the main card -->
        <canvas class="snow-canvas" id="snow-canvas"></canvas>
        
        <!-- Birthday Cake Element -->
        <div class="birthday-cake-container" id="birthday-cake-container">
          <div class="cake-glow-effect"></div>
          <img src="avatars/cake.png" alt="🎂" class="cake-emoji-img" id="cake-emoji">
          <div class="cake-message" id="cake-tooltip">
            <span class="tooltip-title">Мой День Рождения!</span>
            <span class="tooltip-text" id="cake-tooltip-text">В этом году мне исполнилось 15 лет!</span>
          </div>
        </div>

        <!-- Social Connections Links Capsule -->
        <div class="social-links-capsule">
          <div class="capsule-bg"></div>
          <div class="social-links">
            <a class="social-link" href="https://t.me/shdw_i" rel="noopener noreferrer" target="_blank" title="Telegram">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701-.331 4.955c.488 0 .702-.223.974-.488l2.339-2.275 4.863 3.593c.897.495 1.542.239 1.765-.83l3.19-15.03c.328-1.312-.497-1.907-1.353-1.517z"/>
              </svg>
            </a>
            
            <a class="social-link" href="https://www.tiktok.com/@real_pegas?_r=1&_t=ZS-92qXsaREY7Q" rel="noopener noreferrer" target="_blank" title="TikTok">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
              </svg>
            </a>
            
            <a class="social-link" href="https://www.roblox.com/users/4452231393/profile" rel="noopener noreferrer" target="_blank" title="Roblox">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M5.164 0L.16 18.928 18.836 24l5.004-18.928L5.164 0zm9.086 14.066l-4.222-1.12 1.12-4.222 4.222 1.12-1.12 4.222z"/>
              </svg>
            </a>
            
            <button class="social-link delta-force" id="delta-force-btn" title="Скопировать ID Delta Force">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L1 20h5l6-10 6 10h5L12 2z"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="copy-notification" id="copy-notification">
          <svg fill="currentColor" viewBox="0 0 24 24" height="16" width="16">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
          <span>ID скопирован! Это ID в Delta Force</span>
        </div>
      </div>
    </div>

    <!-- Redirect Modal -->
    <div class="hidden modal modal-card" id="redirect-modal">
      <div class="card-glow"><div class="card-glow-inner"></div></div>
      <div class="card-border"></div>
      <div class="card-bg"></div>
      <div class="card-content">
        <canvas class="snow-canvas" id="snow-canvas-redirect"></canvas>
        <div class="modal-content">
          <div class="redirect-icon-container" id="redirect-icon-container"></div>
          <h2 class="redirect-text" id="redirect-text">Перенаправляем...</h2>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-percentage" id="progress-percentage">0%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Copy Success Modal -->
    <div class="hidden modal modal-card" id="success-modal">
      <div class="card-glow"><div class="card-glow-inner"></div></div>
      <div class="card-border"></div>
      <div class="card-bg"></div>
      <div class="card-content">
        <canvas class="snow-canvas" id="snow-canvas-success"></canvas>
        <div class="success-content">
          <div class="success-icon">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
          </div>
          <h2>ID Скопирован!</h2>
          <p class="success-id">Delta Force ID</p>
        </div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
